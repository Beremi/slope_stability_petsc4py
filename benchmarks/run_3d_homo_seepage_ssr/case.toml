[problem]
name = "run_3d_homo_seepage_ssr"
case = "3d_homo_seepage_ssr"
analysis = "ssr"
dimension = 3
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = true
mesh_path = "../../meshes/3d_hetero_seepage_ssr_comsol/comsol_mesh.h5"

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 1.0
d_lambda_init = 0.1
d_lambda_min = 1e-5
d_lambda_diff_scaled_min = 5e-3
omega_max = 3.407e8
step_max = 100

[newton]
it_max = 50
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[seepage]
linear_tolerance = 1e-10
linear_max_iter = 500
water_unit_weight = 9.81
conductivity = [1.0]

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[[materials]]
name = "cover_layer"
c0 = 15.0
phi = 30.0
psi = 0.0
young = 10000.0
poisson = 0.33
gamma_sat = 19.0
gamma_unsat = 19.0

[[materials]]
name = "general_foundation"
c0 = 15.0
phi = 38.0
psi = 0.0
young = 50000.0
poisson = 0.30
gamma_sat = 22.0
gamma_unsat = 22.0

[[materials]]
name = "weak_foundation"
c0 = 10.0
phi = 35.0
psi = 0.0
young = 50000.0
poisson = 0.30
gamma_sat = 21.0
gamma_unsat = 21.0

[[materials]]
name = "slope_mass"
c0 = 18.0
phi = 32.0
psi = 0.0
young = 20000.0
poisson = 0.33
gamma_sat = 20.0
gamma_unsat = 20.0
