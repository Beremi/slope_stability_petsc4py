[problem]
name = "slope_stability_2D_Luzec_SSR"
case = "2d_luzec_ssr"
analysis = "ssr"
dimension = 2
variant = "hetero"
elem_type = "P1"
davis_type = "B"
seepage = true

[case_data]
mesh_dir = "/home/beremi/repos/slope_stability-1/meshes/2d_luzec"

[execution]
node_ordering = "none"
mpi_distribute_by_nodes = false
constitutive_mode = "global"

[continuation]
method = "indirect"
lambda_init = 0.7
d_lambda_init = 0.1
d_lambda_min = 1e-05
d_lambda_diff_scaled_min = 0.001
omega_max = 70000000.0
step_max = 2

[newton]
it_max = 50
it_damp_max = 10
tol = 0.0001
r_min = 0.0001

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 0.1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true
threads = 1

[seepage]
linear_tolerance = 1e-10
linear_max_iter = 300
water_unit_weight = 9.81
conductivity = [0.000864, 86.4, 0.000864, 0.86, 86.4, 0.86, 0.000864, 0.86]

[export]
write_custom_debug_bundle = false
write_history_json = false
write_solution_vtu = true
custom_debug_name = "run_debug.h5"
history_name = "continuation_history.json"
solution_name = "final_solution.vtu"

[[materials]]
name = "S1"
c0 = 14.0
phi = 21.0
psi = 0.0
young = 16000.0
poisson = 0.4
gamma_sat = 21.0
gamma_unsat = 21.0

