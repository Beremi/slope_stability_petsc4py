[benchmark]
title = "3D homogeneous SSR"
matlab_script = "slope_stability_3D_homo_SSR.m"
comparison_kind = "continuation"
mpi_ranks = 8
suite = false

[problem]
name = "run_3d_homo_ssr"
case = "3d_homo_ssr"
analysis = "ssr"
dimension = 3
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = false
mesh_path = "../../meshes/3d_homo_ssr/SSR_homo_ada_L1.msh"
mesh_boundary_type = 0

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 0.9
d_lambda_init = 0.1
d_lambda_min = 1e-5
d_lambda_diff_scaled_min = 1e-3
omega_max = 3000.0
step_max = 100

[newton]
it_max = 100
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[notebook]
family = "3d_continuation"
