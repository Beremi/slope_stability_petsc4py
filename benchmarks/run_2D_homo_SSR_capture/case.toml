[benchmark]
title = "2D homogeneous SSR"
matlab_script = "run_2D_homo_SSR_capture"
comparison_kind = "continuation"
mpi_ranks = 8
suite = true

[notebook]
family = "2d_continuation"

[problem]
name = "run_2D_homo_SSR_capture"
case = "2d_homo_ssr"
analysis = "ssr"
dimension = 2
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = false

[geometry]
h = 1.0
x1 = 15.0
x3 = 15.0
y1 = 10.0
y2 = 10.0
beta_deg = 45.0

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 0.9
d_lambda_init = 0.1
d_lambda_min = 1e-5
d_lambda_diff_scaled_min = 1e-3
omega_max = 7.0e7
step_max = 100

[newton]
it_max = 50
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[[materials]]
name = "homogeneous_slope"
c0 = 6.0
phi = 45.0
psi = 0.0
young = 40000.0
poisson = 0.30
gamma_sat = 20.0
gamma_unsat = 20.0
