[benchmark]
title = "3D SIOPT LL"
matlab_script = "SIOPT_LL.m"
comparison_kind = "continuation"
mpi_ranks = 8
suite = false

[problem]
name = "run_3d_siopt_ll"
case = "3d_siopt_ssr"
analysis = "ll"
dimension = 3
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = false
mesh_path = "../../meshes/3d_siopt/SIOPT_L0.msh"
mesh_boundary_type = 1

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_ell = 1.0
d_t_min = 1e-3
d_omega_ini_scale = 0.2
omega_max = 3.6e7
step_max = 100

[newton]
it_max = 100
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 200
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[notebook]
family = "3d_continuation"
