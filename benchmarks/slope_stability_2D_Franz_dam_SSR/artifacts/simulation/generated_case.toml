[problem]
name = "slope_stability_2D_Franz_dam_SSR"
case = "2d_franz_dam_ssr"
analysis = "ssr"
dimension = 2
variant = "hetero"
elem_type = "P1"
davis_type = "B"
seepage = true

[case_data]
mesh_dir = "/home/beremi/repos/slope_stability-1/meshes/2d_franz_dam"

[execution]
node_ordering = "none"
mpi_distribute_by_nodes = false
constitutive_mode = "global"

[continuation]
method = "indirect"
lambda_init = 0.7
d_lambda_init = 0.1
d_lambda_min = 1e-05
d_lambda_diff_scaled_min = 0.001
omega_max = 10000000000.0
step_max = 2

[newton]
it_max = 50
it_damp_max = 10
tol = 1e-05
r_min = 0.0001

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 0.1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true
threads = 1

[seepage]
linear_tolerance = 1e-10
linear_max_iter = 300
water_unit_weight = 9.81
conductivity = [1e-05, 0.0001, 5e-05, 5e-06, 1e-09, 0.0001, 2e-09, 5e-06, 5e-05, 0.0005]

[export]
write_custom_debug_bundle = false
write_history_json = false
write_solution_vtu = true
custom_debug_name = "run_debug.h5"
history_name = "continuation_history.json"
solution_name = "final_solution.vtu"

[[materials]]
name = "zone_1"
c0 = 50.0
phi = 42.0
psi = 42.0
young = 16000.0
poisson = 0.4
gamma_sat = 27.0
gamma_unsat = 27.0

