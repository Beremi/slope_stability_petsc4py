[benchmark]
title = "3D heterogeneous SSR default"
matlab_script = "slope_stability_3D_hetero_SSR.m"
comparison_kind = "continuation"
mpi_ranks = 8
suite = false

[problem]
name = "3d_hetero_ssr_default"
case = "3d_hetero_ssr"
analysis = "ssr"
dimension = 3
variant = "hetero"
elem_type = "P4"
davis_type = "B"
seepage = false
mesh_path = "../../meshes/3d_hetero_ssr/SSR_hetero_ada_L1.msh"

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 1.0
d_lambda_init = 0.1
d_lambda_min = 1e-3
d_lambda_diff_scaled_min = 1e-3
omega_max = 6.7e6
init_newton_stopping_criterion = "relative_correction"
init_newton_stopping_tol = 1e-3
step_max = 100

[newton]
it_max = 200
it_damp_max = 10
tol = 1e-4
r_min = 1e-4
stopping_criterion = "absolute_delta_lambda"
stopping_tol = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
deflation_basis_tolerance = 1e-3
threads = 16
print_level = 0
use_as_preconditioner = true
compiled_outer = false
recycle_preconditioner = true
pc_backend = "pmg_shell"
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
petsc_opt = ["pc_hypre_boomeramg_max_iter=4", "pc_hypre_boomeramg_tol=0.0"]

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[notebook]
family = "3d_continuation"
jupyter_backend = "client"
nonlinear_surface_subdivision = 0
surface_decimate_reduction = 0.75
boundary_edge_overlay = false
slice_planes_y = [35.0]
slice_planes_z = [43.30127019, 64.95190529]
strain_clim_scale_max = 0.25
