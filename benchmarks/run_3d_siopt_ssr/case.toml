[problem]
name = "run_3d_siopt_ssr"
case = "3d_siopt_ssr"
analysis = "ssr"
dimension = 3
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = false
mesh_path = "../../meshes/3d_siopt/SIOPT_L0.h5"
mesh_boundary_type = 1

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 0.9
d_lambda_init = 0.1
d_lambda_min = 1e-3
d_lambda_diff_scaled_min = 1e-3
omega_max = 3.6e7
step_max = 100

[newton]
it_max = 40
it_damp_max = 10
tol = 1e-5
r_min = 1e-6

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 200
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[[materials]]
name = "siopt_reference"
c0 = 15.0
phi = 20.0
psi = 20.0
young = 40000.0
poisson = 0.30
gamma_sat = 20.0
gamma_unsat = 20.0
