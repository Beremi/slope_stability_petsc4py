[benchmark]
title = "3D heterogeneous seepage SSR COMSOL"
matlab_script = "run_3D_hetero_seepage_SSR_comsol_capture"
comparison_kind = "continuation"
mpi_ranks = 8
suite = true

[notebook]
family = "3d_seepage_continuation"
slice_planes_y = [35.0]
slice_planes_z = [1.0e-16, 21.6506]
strain_clim_scale_max = 0.25

[problem]
name = "run_3D_hetero_seepage_SSR_comsol_capture"
case = "3d_hetero_seepage_ssr_comsol"
analysis = "ssr"
dimension = 3
variant = "hetero"
elem_type = "P2"
davis_type = "B"
seepage = true
mesh_path = "../../meshes/3d_hetero_seepage_ssr_comsol/comsol_mesh.msh"

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 1.0
d_lambda_init = 0.1
d_lambda_min = 1e-5
d_lambda_diff_scaled_min = 5e-3
omega_max = 3.407e8
step_max = 100

[newton]
it_max = 50
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[seepage]
linear_tolerance = 1e-10
linear_max_iter = 500
water_unit_weight = 9.81
conductivity = [1.0]

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true
