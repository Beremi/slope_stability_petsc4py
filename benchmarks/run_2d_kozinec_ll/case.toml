[benchmark]
title = "2D Kozinec LL"
matlab_script = "slope_stability_2D_Kozinec_LL.m"
comparison_kind = "continuation"
mpi_ranks = 8
suite = false

[problem]
name = "run_2d_kozinec_ll"
case = "2d_kozinec_ll"
analysis = "ll"
dimension = 2
variant = "hetero"
elem_type = "P2"
davis_type = "B"
seepage = false

[case_data]
mesh_dir = "../../meshes/2d_kozinec"

[execution]
node_ordering = "none"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_ell = 1.0
d_t_min = 1e-3
d_omega_ini_scale = 0.03333333333333333
omega_max = 200000.0
step_max = 100

[newton]
it_max = 200
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[notebook]
family = "2d_continuation"

[[materials]]
name = "subdomain_1"
c0 = 9.0
phi = 26.0
psi = 0.0
young = 16000.0
poisson = 0.4
gamma_sat = 20.3
gamma_unsat = 20.7

