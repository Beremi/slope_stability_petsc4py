[problem]
name = "slope_stability_3D_hetero_SSR_default"
case = "3d_hetero_ssr"
analysis = "ssr"
dimension = 3
variant = "hetero"
elem_type = "P4"
davis_type = "B"
seepage = false
mesh_path = "/home/beremi/repos/slope_stability-1/meshes/3d_hetero_ssr/SSR_hetero_ada_L1.msh"

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_init = 1.0
d_lambda_init = 0.1
d_lambda_min = 0.001
d_lambda_diff_scaled_min = 0.001
omega_max = 6700000.0
init_newton_stopping_criterion = "relative_correction"
init_newton_stopping_tol = 0.001
step_max = 2

[newton]
it_max = 200
it_damp_max = 10
tol = 0.0001
r_min = 0.0001
stopping_criterion = "absolute_delta_lambda"
stopping_tol = 0.0001

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 0.1
max_iterations = 100
deflation_basis_tolerance = 0.001
threads = 1
print_level = 0
use_as_preconditioner = true
compiled_outer = false
recycle_preconditioner = true
pc_backend = "pmg_shell"
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
petsc_opt = ["pc_hypre_boomeramg_max_iter=4", "pc_hypre_boomeramg_tol=0.0"]

[export]
write_custom_debug_bundle = false
write_history_json = false
write_solution_vtu = true
custom_debug_name = "run_debug.h5"
history_name = "continuation_history.json"
solution_name = "final_solution.vtu"
