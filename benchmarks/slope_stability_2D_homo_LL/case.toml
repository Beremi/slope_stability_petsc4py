[benchmark]
title = "2D homogeneous LL"
matlab_script = "slope_stability_2D_homo_LL.m"
comparison_kind = "continuation"
mpi_ranks = 8
suite = false

[problem]
name = "slope_stability_2D_homo_LL"
case = "2d_homo_ssr"
analysis = "ll"
dimension = 2
variant = "homo"
elem_type = "P2"
davis_type = "B"
seepage = false

[geometry]
h = 0.5
x1 = 15.0
x3 = 15.0
y1 = 10.0
y2 = 10.0
beta_deg = 45.0

[execution]
node_ordering = "block_metis"
mpi_distribute_by_nodes = true
constitutive_mode = "overlap"

[continuation]
method = "indirect"
lambda_ell = 1.0
d_t_min = 1e-3
d_omega_ini_scale = 0.2
omega_max = 2000.0
step_max = 100

[newton]
it_max = 100
it_damp_max = 10
tol = 1e-4
r_min = 1e-4

[linear_solver]
solver_type = "PETSC_MATLAB_DFGMRES_HYPRE_NULLSPACE"
tolerance = 1e-1
max_iterations = 100
pc_hypre_coarsen_type = "HMIS"
pc_hypre_interp_type = "ext+i"
recycle_preconditioner = true

[export]
write_custom_debug_bundle = true
write_history_json = true
write_solution_vtu = true

[notebook]
family = "2d_continuation"

[[materials]]
name = "homogeneous_slope"
c0 = 6.0
phi = 45.0
psi = 0.0
young = 40000.0
poisson = 0.30
gamma_sat = 20.0
gamma_unsat = 20.0
